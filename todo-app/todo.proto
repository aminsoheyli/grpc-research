syntax = "proto3";

package todoPackage;

service Todo {
  // CREATE
  rpc CreateTodo(CreateTodoRequest) returns (TodoItem);

  // READ
  rpc GetTodo(GetTodoRequest) returns (TodoItem);              // Single item
  rpc ListTodos(Empty) returns (TodoItems);                    // Multiple items - Unary - all at once
  rpc ListTodosStream(Empty) returns (stream TodoItem);        // Streaming variant - Streaming - one at a time

  // UPDATE
  rpc UpdateTodo(UpdateTodoRequest) returns (TodoItem);

  // DELETE
  rpc DeleteTodo(DeleteTodoRequest) returns (Empty);
}

message Empty {}

message CreateTodoRequest {
  string title = 1;
  string description = 2;
  bool completed = 3;
}

message GetTodoRequest {
  int32 id = 1;
}

message UpdateTodoRequest {
  int32 id = 1;
  string title = 2;
  string description = 3;
  bool completed = 4;
}

message DeleteTodoRequest {
  int32 id = 1;
}

message TodoItem {
  int32 id = 1;
  string title = 2;
  string description = 3;
  bool completed = 4;
}

message TodoItems {
  repeated TodoItem items = 1;
}