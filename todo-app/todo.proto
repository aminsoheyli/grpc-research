syntax = "proto3";

package todoPackage;

service Todo {
  rpc CreateTodo(CreateTodoRequest) returns (TodoItem);
  rpc ReadTodos(Empty) returns (TodoItems);
}

message Empty {}

message CreateTodoRequest {
  string text = 1;
}
message TodoItem {
  int32 id = 1;
  string text = 2;
}

message TodoItems {
  repeated TodoItem items = 1;
}